name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  # Never cancel an in-flight publish: doing so can leave a tag pointing at a
  # half-pushed manifest while the next run overwrites it. Letting concurrent
  # runs queue is safer than racing on the registry.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push multi-arch image to ghcr.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/webuilder240/beams:latest
            ghcr.io/webuilder240/beams:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=Beams
            org.opencontainers.image.source=https://github.com/webuilder240/beams
            org.opencontainers.image.description=Beams - BigQuery BI tool (ONCE distribution)
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
