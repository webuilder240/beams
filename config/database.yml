# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3
  # System spec（Playwright/js）では Puma サーバスレッドとテストスレッドが
  # 同一 SQLite ファイルに同時アクセスし得る。busy_timeout を明示して
  # 競合時に即 BusyException を投げず待機させる（"database is locked" 対策）。
  timeout: 10000
  pragmas:
    busy_timeout: 10000

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
    # SolidQueue は config/queue.yml の workers.threads 合計（"*" の 3 +
    # "query_execution" の ENV("QUERY_EXECUTION_CONCURRENCY", 10) = 計 13）に
    # dispatcher 等の内部スレッドが加算された connection を要求するため、
    # default の max_connections（RAILS_MAX_THREADS=5）では不足して
    # `bin/jobs` が起動直後に exit する。queue DB だけ pool を別枠で
    # 引き上げる。query_execution の同時実行を環境変数で増やす場合は
    # QUEUE_DB_MAX_CONNECTIONS も合わせて引き上げること
    # （spec/config/queue_database_pool_spec.rb で整合性を検査）。
    max_connections: <%= ENV.fetch("QUEUE_DB_MAX_CONNECTIONS", 15) %>
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
