default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    # クエリ実行ジョブ専用ワーカー（トピック10）。BigQuery 完了を
    # wait_until_done! でブロックして待つため、同時実行可能な thread を確保する。
    # 同時実行上限はアプリ側（Queries::ExecutionsController::CONCURRENCY_LIMIT）でも
    # 担保しており、デフォルトは両者を 10 に揃える。負荷次第で
    # QUERY_EXECUTION_CONCURRENCY を引き上げる場合は config/database.yml の
    # QUEUE_DB_MAX_CONNECTIONS と CONCURRENCY_LIMIT も合わせて見直すこと。
    - queues: "query_execution"
      threads: <%= ENV.fetch("QUERY_EXECUTION_CONCURRENCY", 10) %>
      processes: 1
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
